name: Publicar sistema de reservas

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obtener el proyecto
        uses: actions/checkout@v4
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Preparar archivos públicos
        run: |
          mkdir _site
          find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' -o -name '*.ico' \) -exec cp {} _site/ \;
          cp -r plantillas _site/
      - name: Empaquetar sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
